<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Workflow — Trường ĐH FPT Cần Thơ</title>
<style>
:root{
  --bg:#070a14;--bg2:#0b1020;--cyan:#35d0ee;--violet:#9b8cff;--purple:#a855f7;--pink:#f472b6;
  --orange:#ff9a4d;--green:#42e8c0;--text:#eaf0fb;--muted:#8a9ac0;--faint:#5d6b8f;
  --line:rgba(120,150,230,.16);--line2:rgba(120,150,230,.28);
  --card:rgba(18,26,48,.55);--glass:rgba(12,18,38,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:.1px}
#bg-canvas{position:fixed;inset:0;z-index:0;display:block;cursor:grab}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 42%,rgba(7,10,20,0) 30%,rgba(7,10,20,.55) 74%,rgba(7,10,20,.94) 100%);}

#deck{position:relative;z-index:2;height:100vh;width:100vw;overflow:hidden;}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;
  padding:clamp(28px,5vw,90px);opacity:0;transform:translateY(24px) scale(.99);
  transition:opacity .55s ease,transform .55s cubic-bezier(.2,.8,.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.slide.active{display:flex;opacity:1;transform:none;}
.slide:focus{outline:none;}
.slide.doc{padding-top:0;padding-bottom:84px;}
.slide.doc.active{display:block !important;height:100vh !important;max-height:100vh !important;overflow-y:auto !important;transform:none !important;transition:none !important;}
.wrap{width:100%;max-width:1140px;margin:0 auto;}


.shead{flex:0 0 auto;position:relative;z-index:2;padding-top:62px;padding-bottom:18px;background:var(--bg);}
.shead h2{font-size:clamp(28px,4vw,50px);font-weight:800;text-shadow:0 2px 26px rgba(8,12,24,.9);}
.shead h2 .grad,.shead h2 .grad-o{filter:drop-shadow(0 0 22px rgba(53,208,238,.28))}
.shead h2 .grad-o{filter:drop-shadow(0 0 22px rgba(255,154,77,.3))}
.shead:after{content:"";display:block;width:60px;height:4px;margin-top:16px;border-radius:4px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));box-shadow:0 0 16px rgba(53,208,238,.5)}
.shead .kicker{margin-bottom:15px}

.kicker{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;
  padding:7px 14px;border:1px solid var(--line);border-radius:999px;background:var(--glass);}
.kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);}
.kicker.p2{color:var(--violet)} .kicker.p2 .dot{background:var(--violet);box-shadow:0 0 10px var(--violet)}
.kicker.p3{color:var(--orange)} .kicker.p3 .dot{background:var(--orange);box-shadow:0 0 10px var(--orange)}

h1{font-size:clamp(34px,5.4vw,64px);line-height:1.06;font-weight:800;letter-spacing:-1.2px;}
h2{font-size:clamp(24px,3.2vw,40px);line-height:1.14;font-weight:800;letter-spacing:-.6px;}
h3{font-size:clamp(16px,1.6vw,20px);font-weight:700;letter-spacing:-.2px}
.grad{background:linear-gradient(100deg,var(--cyan),var(--violet) 60%,var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;}
.grad-o{background:linear-gradient(100deg,var(--orange),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;}
.lead{font-size:clamp(15px,1.55vw,18px);color:var(--muted);line-height:1.65;max-width:760px;margin-top:14px;}
p{line-height:1.6}.muted{color:var(--muted)}

.grid{display:grid;gap:16px;margin-top:24px;}
.g3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;
  backdrop-filter:blur(10px);position:relative;overflow:hidden;transition:.3s}
.card:hover{border-color:var(--line2);transform:translateY(-3px)}
.card h3{margin-bottom:7px}.card p{font-size:14px;color:var(--muted);line-height:1.55}
.bar{position:absolute;left:0;top:0;height:3px;width:100%;background:linear-gradient(90deg,var(--cyan),var(--violet))}
.bar.or{background:linear-gradient(90deg,var(--orange),var(--pink))}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.6px;padding:5px 11px;border-radius:999px;margin-bottom:11px;border:1px solid var(--line);}
.tag.cy{color:var(--cyan);background:rgba(53,208,238,.08)} .tag.or{color:var(--orange);background:rgba(255,154,77,.08)} .tag.gr{color:var(--green);background:rgba(66,232,192,.08)}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:22px;align-items:start}
.caserow{display:grid;grid-template-columns:320px 1fr;gap:34px;align-items:start;margin-top:6px}
.caserow .cside{position:sticky;top:80px;align-self:start}

ul.clean{list-style:none;margin-top:14px}
ul.clean li{position:relative;padding-left:24px;margin-bottom:11px;font-size:15px;color:#cdd8f2;line-height:1.55}
ul.clean li:before{content:"";position:absolute;left:2px;top:8px;width:8px;height:8px;border-radius:2px;background:linear-gradient(135deg,var(--cyan),var(--violet));}
ul.clean li b{color:#fff}

/* spec card (case side) */
.spec{background:linear-gradient(165deg,rgba(22,30,56,.72),rgba(11,16,34,.5));border:1px solid var(--line);
  border-radius:20px;padding:26px;position:relative;overflow:hidden}
.spec:before{content:"";position:absolute;top:-40%;right:-30%;width:80%;height:80%;border-radius:50%;
  background:radial-gradient(circle,rgba(53,208,238,.16),transparent 70%);pointer-events:none}
.spec.or:before{background:radial-gradient(circle,rgba(255,154,77,.16),transparent 70%)}
.spec-ic{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;font-size:26px;
  background:rgba(53,208,238,.1);border:1px solid var(--line2);margin-bottom:16px;box-shadow:0 0 24px rgba(53,208,238,.12)}
.spec.or .spec-ic{background:rgba(255,154,77,.1);box-shadow:0 0 24px rgba(255,154,77,.12)}
.spec .lead{margin-top:0;font-size:15px;color:#c8d3ee;max-width:none}

.metric{display:flex;gap:24px;margin-top:20px;flex-wrap:wrap}
.metric .big{font-size:clamp(24px,3vw,34px);font-weight:800;line-height:1;letter-spacing:-1px}
.metric .lbl{font-size:12px;color:var(--muted);margin-top:6px}
.pillrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.pill{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--glass);color:#c8d3ee}
.pill.small{font-size:11.5px;padding:5px 11px}
.pill b{color:var(--cyan)}

/* accordion */
.acc{margin-top:8px;display:flex;flex-direction:column;gap:11px}
.ai{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;backdrop-filter:blur(8px);transition:.25s}
.ai:hover{border-color:var(--line2)} .ai.open{border-color:rgba(53,208,238,.5)} .ai.or.open{border-color:rgba(255,154,77,.5)}
.ah{display:flex;align-items:center;gap:14px;padding:15px 17px;cursor:pointer;user-select:none;transition:background .2s}
.ah:hover{background:rgba(255,255,255,.025)}
.ah .num{flex:0 0 auto;width:29px;height:29px;border-radius:9px;display:grid;place-items:center;font-size:13px;font-weight:800;color:#04101a;background:linear-gradient(135deg,var(--cyan),var(--green));}
.ai.or .ah .num{background:linear-gradient(135deg,var(--orange),var(--pink));color:#190a04}
.ah .ttl{flex:1;font-size:15.5px;font-weight:700}
.ah .ttl small{display:block;font-size:12.5px;font-weight:500;color:var(--muted);margin-top:3px;letter-spacing:.1px}
.ah .chev{flex:0 0 auto;color:var(--faint);font-size:15px;transition:transform .3s}
.ai.open .chev{transform:rotate(90deg);color:var(--cyan)} .ai.or.open .chev{color:var(--orange)}
.ab{max-height:0;overflow:hidden;transition:max-height .45s ease}
.ai.open .ab{max-height:2400px;overflow:visible;}
.ab-in{padding:2px 19px 19px 60px;font-size:14px;color:#cdd8f2;line-height:1.65}
.ab-in ul{list-style:none;margin:0}
.ab-in li{position:relative;padding-left:18px;margin-bottom:8px}
.ab-in li:before{content:"›";position:absolute;left:0;color:var(--cyan);font-weight:800}
.ai.or .ab-in li:before{color:var(--orange)}
.ab-in b{color:#fff}
.ab-in .note{margin-top:12px;font-size:13px;color:var(--muted);border-left:2px solid var(--line2);padding-left:13px}
.ab-in code{background:rgba(120,150,230,.13);padding:2px 7px;border-radius:6px;font-size:12.5px;color:#aee6ff;font-family:'SF Mono',Consolas,monospace}
@media(max-width:880px){.ab-in{padding-left:19px}}

.code{position:relative;background:#060a16;border:1px solid var(--line);border-radius:12px;margin-top:14px;overflow:hidden;font-family:'SF Mono',Consolas,monospace}
.code .hd{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
.code .hd .ttl{font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:.4px} .code .hd .ttl.or{color:var(--orange)}
.copy{background:rgba(53,208,238,.12);border:1px solid var(--line);color:var(--cyan);font-size:11.5px;font-weight:700;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.2s;font-family:inherit}
.copy:hover{background:rgba(53,208,238,.25)} .copy.done{color:var(--green);border-color:var(--green)}
.code pre{padding:14px 16px;font-size:12.5px;line-height:1.65;color:#c7d4f0;white-space:pre-wrap;overflow-x:auto;max-height:42vh}
.code pre .c{color:#5d6b8f}.code pre .k{color:var(--cyan)}.code pre .s{color:var(--green)}

.shot{margin:13px 0 2px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0a1020;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.shot img{width:100%;display:block;max-height:56vh;object-fit:contain;background:#0a1020}
.shot figcaption{font-size:12px;color:var(--muted);padding:8px 13px;border-top:1px solid var(--line)}

/* ===== TOP BAR + MENU BUTTON ===== */
#topbar{position:fixed;top:0;left:0;right:0;z-index:12;display:flex;justify-content:space-between;align-items:center;
  padding:13px 24px 18px;pointer-events:none;background:linear-gradient(180deg,rgba(7,10,20,.9),rgba(7,10,20,0));}
#menuBtn{display:flex;align-items:center;gap:13px;pointer-events:auto;cursor:pointer;background:none;border:0;padding:7px 9px;border-radius:12px;transition:.2s}
#menuBtn:hover{background:rgba(120,150,230,.1)}
.mlines{display:flex;flex-direction:column;gap:4px}
.mlines span{width:19px;height:2px;background:var(--text);border-radius:2px;transition:.3s}
#menuBtn:hover .mlines span:nth-child(1){width:13px}#menuBtn:hover .mlines span:nth-child(3){width:13px}
.fptlogo{height:32px;width:auto;display:block;filter:drop-shadow(0 0 10px rgba(255,154,77,.22))}
.barlabel{font-size:11px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;pointer-events:none}
#progress{position:fixed;top:0;left:0;height:3px;z-index:13;width:0%;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--orange));box-shadow:0 0 12px rgba(120,160,255,.6);transition:width .45s ease}

/* ===== LEFT DRAWER MENU ===== */
#overlay{position:fixed;inset:0;z-index:20;background:rgba(4,6,14,.55);opacity:0;visibility:hidden;transition:opacity .35s;backdrop-filter:blur(2px)}
#overlay.show{opacity:1;visibility:visible}
#menu{position:fixed;top:0;left:0;bottom:0;width:328px;max-width:85vw;z-index:25;
  background:linear-gradient(180deg,rgba(11,16,32,.98),rgba(8,11,22,.98));border-right:1px solid var(--line2);
  transform:translateX(-106%);transition:transform .42s cubic-bezier(.2,.85,.25,1);
  backdrop-filter:blur(16px);display:flex;flex-direction:column;box-shadow:36px 0 80px rgba(0,0,0,.5)}
#menu.open{transform:none}
.menu-top{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
.menu-top .mt-l{display:flex;align-items:center;gap:11px}
.menu-top .mt-l .ttl{font-size:13px;font-weight:700;line-height:1.2}.menu-top .mt-l .ttl span{display:block;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:500}
#closeMenu{background:none;border:1px solid var(--line);color:var(--muted);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:17px;transition:.2s}
#closeMenu:hover{border-color:var(--cyan);color:var(--cyan)}
#toc{overflow-y:auto;padding:12px 12px 34px;flex:1}
.toc-g{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);margin:16px 13px 7px;font-weight:700}
.toc-a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;color:#c2cfee;font-size:14px;cursor:pointer;transition:.18s;border:1px solid transparent}
.toc-a:hover{background:rgba(120,160,255,.09);color:#fff}
.toc-a.active{background:linear-gradient(90deg,rgba(53,208,238,.16),rgba(53,208,238,.02));color:#fff;box-shadow:inset 2px 0 0 var(--cyan)}
.toc-a .n{font-size:11px;color:var(--faint);min-width:24px;font-variant-numeric:tabular-nums;font-weight:700}
.toc-a.active .n{color:var(--cyan)}

/* bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:12;display:flex;justify-content:space-between;align-items:center;padding:15px 24px;pointer-events:none;background:linear-gradient(0deg,rgba(7,10,20,.85),rgba(7,10,20,0));}
.dots{display:flex;gap:7px;pointer-events:auto;flex-wrap:wrap;max-width:56vw}
.dots .d{width:8px;height:8px;border-radius:50%;background:rgba(150,170,225,.22);cursor:pointer;transition:.25s}
.dots .d.on{background:linear-gradient(135deg,var(--cyan),var(--violet));width:24px;border-radius:5px;box-shadow:0 0 12px rgba(120,160,255,.5)}
.navbtns{display:flex;gap:10px;pointer-events:auto;align-items:center}
.nbtn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--glass);color:var(--text);cursor:pointer;font-size:18px;backdrop-filter:blur(8px);transition:.2s;display:grid;place-items:center}
.nbtn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 18px rgba(53,208,238,.22)}
.counter{font-size:13px;color:var(--muted);min-width:52px;text-align:center;font-variant-numeric:tabular-nums}.counter b{color:var(--text)}
.hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:12;font-size:12px;color:var(--muted);background:var(--glass);padding:6px 14px;border-radius:999px;border:1px solid var(--line);backdrop-filter:blur(8px);animation:fade 7s forwards 5s;pointer-events:none}
@keyframes fade{to{opacity:0;visibility:hidden}}

/* hero / dividers */
.hero-title{font-size:clamp(40px,7.2vw,90px);line-height:1.0;letter-spacing:-2.5px;font-weight:800}
.hero-title .grad{filter:drop-shadow(0 0 36px rgba(53,208,238,.4))}
.hero-sub{margin-top:18px;font-size:clamp(18px,2.5vw,32px);font-weight:600;color:var(--text);letter-spacing:.2px}
.hero-sub .fpt{color:var(--orange);font-weight:800}
.author{margin-top:24px;font-size:14px;color:var(--muted);letter-spacing:.4px}
.author span{display:inline-block;margin-left:4px;padding:4px 13px;border-radius:999px;font-weight:700;color:var(--text);
  background:linear-gradient(90deg,rgba(53,208,238,.14),rgba(155,140,255,.14));border:1px solid var(--line)}
.hero-sub:after{content:"";display:block;width:90px;height:3px;margin:18px auto 0;border-radius:3px;
  background:linear-gradient(90deg,var(--cyan),var(--violet),var(--orange));box-shadow:0 0 18px rgba(120,160,255,.45)}
.herocard{margin:26px auto 0;max-width:640px;background:linear-gradient(165deg,rgba(22,30,56,.6),rgba(11,16,34,.4));
  border:1px solid var(--line);border-radius:22px;padding:30px 34px;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.herocard:before{content:"";position:absolute;top:-50%;left:-10%;width:60%;height:120%;background:radial-gradient(circle,rgba(53,208,238,.14),transparent 65%)}
.bignum{font-size:clamp(80px,15vw,180px);font-weight:800;line-height:.8;letter-spacing:-6px;
  background:linear-gradient(160deg,rgba(120,150,230,.35),rgba(120,150,230,.05));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}

@media(max-width:880px){
  .g3{grid-template-columns:1fr}.cols{grid-template-columns:1fr;gap:18px}
  .caserow{grid-template-columns:1fr;gap:20px}
  .caserow .cside{position:static;top:auto}
  .dots{max-width:34vw}.slide{padding:70px 18px 88px}.slide.doc{padding-top:0}
  .barlabel{display:none}
}
.slide.active .reveal{animation:rise .55s both}
.slide.active .reveal:nth-child(2){animation-delay:.07s}
.slide.active .reveal:nth-child(3){animation-delay:.14s}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<div id="progress"></div>

<!-- top bar -->
<div id="topbar">
  <button id="menuBtn" aria-label="Mở menu">
    <span class="mlines"><span></span><span></span><span></span></span>
    <img class="fptlogo" src="assets/fptu_logo.png" alt="Trường Đại học FPT">
  </button>
  <div class="barlabel">AI Automation Workflow</div>
</div>

<!-- left drawer -->
<div id="overlay"></div>
<aside id="menu">
  <div class="menu-top">
    <div class="mt-l"><img class="fptlogo" src="assets/fptu_logo.png" alt="FPT"><div class="ttl">Mục lục<span>AI Automation</span></div></div>
    <button id="closeMenu" aria-label="Đóng">×</button>
  </div>
  <nav id="toc"></nav>
</aside>

<div id="deck"></div>

<div id="nav">
  <div class="dots" id="dots"></div>
  <div class="navbtns"><div class="counter"><b id="cur">1</b> / <span id="total">0</span></div>
    <button class="nbtn" id="prev">‹</button><button class="nbtn" id="next">›</button></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
function acc(items,orange){
  return '<div class="acc">'+items.map((it,i)=>
    '<div class="ai'+(orange?' or':'')+'"><div class="ah"><span class="num">'+(i+1)+'</span>'+
    '<span class="ttl">'+it.t+(it.s?'<small>'+it.s+'</small>':'')+'</span><span class="chev">›</span></div>'+
    '<div class="ab"><div class="ab-in">'+it.b+'</div></div></div>').join('')+'</div>';
}
function code(title,body,orange){
  return '<div class="code"><div class="hd"><span class="ttl'+(orange?' or':'')+'">'+title+'</span><button class="copy">Copy</button></div><pre>'+body+'</pre></div>';
}
function shot(src,cap){return '<figure class="shot"><img src="assets/'+src+'" alt="'+cap+'"><figcaption>'+cap+'</figcaption></figure>';}
function spec(o){
  return '<div class="spec cside'+(o.or?' or':'')+'"><div class="spec-ic">'+o.ic+'</div><p class="lead">'+o.lead+'</p>'+
    '<div class="metric">'+o.m.map(x=>'<div><div class="big '+(o.or?'grad-o':'grad')+'">'+x[0]+'</div><div class="lbl">'+x[1]+'</div></div>').join('')+'</div>'+
    (o.tags?'<div class="pillrow">'+o.tags.map(t=>'<span class="pill small">'+t+'</span>').join('')+'</div>':'')+'</div>';
}

const slides = [

/* 0 TITLE */
`<div class="wrap" style="text-align:center">
  <div class="kicker reveal" style="margin-inline:auto"><span class="dot"></span>AI Automation Workflow · 2026</div>
  <h1 class="hero-title reveal">Tự động hoá công việc<br>bằng <span class="grad">AI</span></h1>
  <div class="hero-sub reveal">tại Trường Đại học <span class="fpt">FPT</span> Cần Thơ</div>
  <div class="herocard reveal">
    <p class="lead" style="margin:0 auto;text-align:center;color:#c8d3ee">Hai hướng đi thực tế: <b style="color:#fff">(1)</b> dùng ngay công cụ có sẵn — Claude Cowork, Antigravity, Codex; <b style="color:#fff">(2)</b> tạo công cụ / skill / agent mới cho việc lặp lại.</p>
    <div class="pillrow" style="justify-content:center;margin-top:20px">
      <div class="pill">✉️ Lọc email</div><div class="pill">🎪 Tổ chức sự kiện</div><div class="pill">📰 Bản tin AI</div>

/* 3 CASE 1.1 EMAIL */
`<div class="wrap">
  <div class="shead reveal"><div class="kicker"><span class="dot"></span>Case 1.1 · Lọc, sắp xếp & phân loại email / văn bản</div><h2>Sàng lọc hộp thư <span class="grad">tự động mỗi sáng</span></h2></div>
  <div class="caserow reveal">
    ${spec({ic:'✉️',lead:'Agent tự động đọc tiêu đề, nội dung email và cả văn bản đính kèm để phân loại, sau đó di chuyển email vào thư mục (folder) đã được thiết lập sẵn.',m:[['24h','Quét email chưa đọc gần nhất'],['07:00','Chạy tự động mỗi sáng']],tags:['Claude Cowork','Gmail / Outlook App']})}
    <div>${acc([
      {t:'Kết nối hộp thư & công cụ',s:'Mở Claude Cowork, kết nối hộp thư',b:'<ul><li>Đối với <b>Gmail</b>: Mở <b>Claude Cowork</b> → <b>Customize → Connectors</b> → kết nối Gmail và cấp quyền.</li><li>Đối với <b>Outlook</b>: Do Cowork không kết nối trực tiếp được Outlook trong mục Connectors, bạn phải sử dụng <b>ứng dụng Outlook (Outlook App)</b> trên máy tính để agent tương tác.</li><li><b>Tạo sẵn các thư mục (folder)</b> trong ứng dụng Email tương ứng với danh sách nhãn: <code>Sinh viên · Công văn · Nội bộ · Khẩn · Spam</code>.</li><li>Nếu là văn bản dạng file: chọn (mount) thư mục chứa file để Claude đọc được.</li></ul>'+shot('cowork-connectors.png','Giao diện kết nối trong Claude Cowork (chỉ dùng cho Gmail)')},
      {t:'Ra lệnh phân loại & di chuyển',s:'Dán prompt — đọc thư, file đính kèm & di chuyển',b:'<ul><li>Dán câu lệnh dưới đây vào ô chat của Cowork để agent tự động đọc nội dung email, đọc văn bản đính kèm, phân loại và di chuyển vào thư mục tương ứng.</li></ul>'+code('PROMPT · Phân loại & Di chuyển email','<span class="c"># Vai trò</span>\nBạn là trợ lý phân loại email tự động của một phòng ban tại Trường ĐH FPT Cần Thơ.\n\n<span class="c"># Nhiệm vụ</span>\nQuét các email CHƯA ĐỌC trong 24h qua. Với mỗi email:\n1. Đọc kỹ tiêu đề, nội dung email và đọc cả nội dung các file văn bản đính kèm (PDF, Word, Ảnh... nếu có).\n2. Phân tích nội dung để gắn 1 nhãn phù hợp: [Sinh viên][Công văn][Nội bộ][Khẩn][Spam].\n3. Tự động di chuyển email đó vào thư mục (folder) đã setup sẵn trên hộp thư có tên tương ứng với nhãn (Ví dụ: nhãn [Sinh viên] chuyển vào folder "Sinh viên", nhãn [Spam] chuyển vào folder "Spam"...).\n4. Tóm tắt nội dung email trong 1 câu (≤25 từ) và đề xuất hành động cần làm.\n\n<span class="c"># Quy tắc phân loại</span>\n- "Khẩn" nếu có hạn xử lý trong 48h hoặc gửi từ Ban Giám hiệu.\n- Email liên quan đến học vụ, điểm số, học phí hoặc đính kèm danh sách SV -> luôn phân vào folder "Sinh viên".\n- Email từ các phòng ban khác trong trường -> luôn phân vào folder "Nội bộ".\n- Tên miền lạ + link rút gọn -> nghi Spam, di chuyển ngay vào folder "Spam" và không mở link.\n\n<span class="c"># Đầu ra</span>\nBảng tổng hợp: | Người gửi | Tiêu đề | Nhãn (Folder di chuyển) | Tóm tắt | Hành động | Trạng thái di chuyển |')},
      {t:'Xem kết quả & tinh chỉnh',s:'Sửa quy tắc nếu phân loại chưa chính xác',b:'<ul><li>Kiểm tra trạng thái di chuyển email trong bảng tổng hợp xem đã vào đúng folder chưa.</li><li>Nếu một loại email bị phân nhãn sai: Thêm quy tắc chi tiết cho agent, ví dụ: <code>Văn bản đính kèm có từ "Kế hoạch tuyển sinh" → luôn phân vào folder "Công văn".</code></li></ul><div class="note">Mẹo: Trong vài ngày đầu, bạn có thể bảo agent chỉ "đề xuất di chuyển folder" và in bảng kết quả để kiểm tra trước, sau khi hoạt động chính xác 100% thì mới cho phép agent tự động thực hiện thao tác di chuyển (Move).</div>'},
      {t:'Lên lịch chạy tự động',s:'Mỗi sáng 7:00 không cần bấm tay',b:'<ul><li>Bảo Cowork: <i>"Chạy việc phân loại này mỗi sáng lúc 7:00 và gửi cho tôi bảng tổng hợp."</i></li><li>Hệ thống tạo một <b>Scheduled task</b> chạy lặp lại.</li></ul>'+shot('cowork-schedule-list.png','Tác vụ định kỳ (Scheduled tasks) trong Claude Cowork')}
    ])}</div>
  </div>
</div>`,

/* 4 CASE 1.2 EVENT */
`<div class="wrap">
  <div class="shead reveal"><div class="kicker"><span class="dot"></span>Case 1.2 · Tổ chức sự kiện</div><h2>Hệ thống Multi-Agent <span class="grad">tổ chức sự kiện tự động</span></h2></div>
  <div class="caserow reveal">
    ${spec({ic:'🎪',lead:'Hệ thống Multi-Agent chạy trong Antigravity phối hợp tự động tổ chức sự kiện: làm rõ thông tin, phân rã công việc cho các agent phụ (checklist, plan, kịch bản, thiết kế ấn phẩm với Canva MCP) và hiển thị tiến độ trên dashboard real-time.',m:[['5 Agents','Chạy song song liên tục'],['Real-time','Dashboard giám sát']],tags:['Antigravity','Canva MCP','Multi-Agent System']})}
    <div>${acc([
      {t:'1. Khởi chạy & Thiết lập Agents',s:'Thiết lập hệ thống 5 Agents chạy trong Antigravity',b:'<ul><li>Khởi tạo <b>Agent tổng điều phối (Coordinator Agent)</b> và 4 Agent phụ chuyên trách.</li><li>Kết nối <b>Canva MCP</b> để thiết kế hình ảnh tự động.</li><li>Bật Dashboard quản lý để giám sát tiến độ hoạt động real-time của từng agent.</li></ul>'+code('PYTHON · Cấu hình hệ thống Multi-Agent','<span class="k">from</span> agents <span class="k">import</span> CoordinatorAgent, SubAgent\n<span class="k">from</span> mcp <span class="k">import</span> CanvaMCPConnector\n\n<span class="c"># Thiết lập các Agent chuyên trách</span>\nplanning_agent = SubAgent(name=<span class="s">"Planning Agent"</span>, role=<span class="s">"Lập checklist & timeline"</span>)\ndesign_agent = SubAgent(name=<span class="s">"Design Agent"</span>, role=<span class="s">"Thiết kế Canva MCP"</span>)\ncontent_agent = SubAgent(name=<span class="s">"Content Agent"</span>, role=<span class="s">"Soạn kịch bản & thư mời"</span>)\npr_agent = SubAgent(name=<span class="s">"PR Agent"</span>, role=<span class="s">"Lập plan truyền thông"</span>)\n\ncoordinator = CoordinatorAgent(\n    name=<span class="s">"Event Coordinator"</span>,\n    sub_agents=[planning_agent, design_agent, content_agent, pr_agent],\n    mcp_connectors=[CanvaMCPConnector()]\n)',true)},
      {t:'2. Agent Tổng làm rõ yêu cầu (Interview & Brief)',s:'Phỏng vấn để làm rõ các thông tin còn thiếu',b:'<ul><li>Khi được giao tổ chức sự kiện với thông tin sơ sài (ví dụ: "Làm ngày hội tuyển sinh"), <b>Agent Tổng</b> sẽ kiểm tra các thông tin cốt lõi.</li><li>Nếu thiếu, Agent Tổng sẽ hỏi kỹ lại người dùng về: <b>Danh sách khách mời, diễn giả, thời gian, địa điểm, thành phần tham dự...</b> trước khi phân việc.</li></ul>'+code('PROMPT · Phỏng vấn làm rõ thông tin','<span class="c"># Phân tích Event Brief</span>\nBạn là Coordinator Agent. Hãy rà soát yêu cầu tổ chức sự kiện của người dùng.\nNếu thiếu bất kỳ thông tin nào dưới đây, hãy đặt câu hỏi lịch sự để làm rõ:\n- Đối tượng tham dự & số lượng dự kiến?\n- Danh sách khách mời đặc biệt & Diễn giả (nếu có)?\n- Thời gian, địa điểm cụ thể?\n- Ngân sách giới hạn?\n\nChỉ khi người dùng cung cấp đủ, mới kích hoạt các Sub-agents.',true)},
      {t:'3. Phối hợp các Agent phụ & Canva MCP',s:'Vận hành song song và liên tục để thiết kế & viết nội dung',b:'<ul><li>Các Sub-agents chạy đồng thời và liên tục phối hợp chéo với nhau:</li><li><b>Planning Agent</b>: Dựng checklist hậu cần và timeline đếm ngược.</li><li><b>Content & PR Agent</b>: Viết kịch bản MC chi tiết, draft thư mời và plan truyền thông.</li><li><b>Design Agent</b>: Kết nối <b>Canva MCP</b> tự động tạo và xuất bản các ấn phẩm đúng kích thước yêu cầu: <code>Ảnh post Facebook (1200x628)</code>, <code>Backdrop sân khấu</code>, và <code>Standee điện tử (1080x1920)</code> dựa trên danh sách diễn giả/nội dung từ Content Agent.</li></ul>'+code('MCP CALL · Tạo Standee điện tử trên Canva','<span class="c"># Gọi Canva MCP tạo standee điện tử 1080x1920</span>\nawait design_agent.call_mcp(\n    server=<span class="s">"canva"</span>,\n    tool=<span class="s">"create-design"</span>,\n    arguments={\n        <span class="s">"title"</span>: <span class="s">"Standee Điện Tử - Ngày hội tuyển sinh 2026"</span>,\n        <span class="s">"width"</span>: 1080,\n        <span class="s">"height"</span>: 1920,\n        <span class="s">"template_id"</span>: <span class="s">"fptu_standee_template_v1"</span>,\n        <span class="s">"variables"</span>: {\n            <span class="s">"title"</span>: content_agent.shared_data[<span class="s">"event_title"</span>],\n            <span class="s">"speaker"</span>: content_agent.shared_data[<span class="s">"speakers"</span>],\n            <span class="s">"time"</span>: coordinator.shared_data[<span class="s">"time"</span>]\n        }\n    }\n)',true)},
      {t:'4. Dashboard quản lý & Tiến độ Real-time',s:'Giám sát trạng thái hoạt động của các Agents trong Antigravity',b:'<ul><li>Dashboard real-time hiển thị sơ đồ quan hệ và trạng thái của từng agent: <code>Idle</code>, <code>Working</code>, <code>Waiting for Input</code>, <code>Completed</code>.</li><li>Theo dõi tiến độ hoàn thành checklist thời gian thực.</li><li><b>Human-in-the-loop</b>: Người dùng có thể xem trước và duyệt các bản thảo kịch bản hoặc thiết kế hình ảnh từ Canva ngay trên Dashboard trước khi các Agents xuất bản chính thức.</li></ul>'+shot('cowork-schedule-list.png','Dashboard quản lý tác vụ và tiến độ các agents trong hệ thống')}
    ])}</div>
  </div>
</div>`,

/* 5 CASE 1.3 AI NEWS */
`<div class="wrap">
  <div class="shead reveal"><div class="kicker"><span class="dot"></span>Case 1.3 · Bản tin AI hằng ngày</div><h2>Bản tin AI <span class="grad">tự tổng hợp & gửi mỗi sáng</span></h2></div>
  <div class="caserow reveal">
    ${spec({ic:'📰',lead:'Tổng hợp tin tức AI từ 8 nguồn uy tín, dịch & tóm tắt tiếng Việt, tự động kiểm duyệt link/ảnh, dựng bản tin HTML đẹp và gửi qua Outlook Desktop.',m:[['08:00 sáng','Chạy tự động mỗi ngày'],['8 nguồn AI','Cập nhật liên tục']],tags:['Antigravity / Cowork','Outlook (AppleScript/COM)','Scheduled Task']})}
    <div>${acc([
      {t:'1. Lên lịch chạy (Scheduled Trigger 8:00 sáng)',s:'Tự động kích hoạt mỗi ngày đúng giờ đi làm',b:'<ul><li>Hệ thống được thiết lập chạy định kỳ tự động lúc <b>8:00 sáng</b> mỗi ngày.</li><li>Agent tự động khởi động quy trình mà không cần con người nhấp chuột.</li></ul>'},
      {t:'2. Sưu tập tin tức & Tóm tắt',s:'Thu thập từ 8 nguồn tin AI lớn nhất',b:'<ul><li>Agent tự động quét và thu thập tin tức nổi bật nhất trong 24h qua từ <b>8 nguồn AI uy tín</b>: OpenAI, Google AI, TechCrunch, VentureBeat, The Verge, Wired, MIT Tech Review và Hugging Face.</li><li>Dịch sang tiếng Việt và tóm tắt ngắn gọn tối đa <b>150 chữ cho mỗi tin</b>.</li></ul>'+code('PROMPT · Sưu tập & Tóm tắt tin AI','<span class="c"># Vai trò</span>\nBạn là trợ lý tổng hợp tin tức công nghệ của Trường ĐH FPT Cần Thơ.\n\n<span class="c"># Nhiệm vụ</span>\nThu thập tin tức AI nổi bật trong 24h qua từ 8 nguồn: OpenAI, Google, TechCrunch, VentureBeat, The Verge, Wired, MIT Tech Review, Hugging Face.\nVới mỗi tin tức:\n1. Tiêu đề tiếng Việt chuẩn xác.\n2. Tóm tắt nội dung chính ngắn gọn (~150 chữ).\n3. Bổ sung link bài viết gốc và link ảnh thumbnail (ảnh minh hoạ).')},
      {t:'3. Kiểm tra link & ảnh (Recheck)',s:'Xác minh tất cả đường dẫn trước khi gửi',b:'<ul><li><b>Bước kiểm định cực kỳ quan trọng</b>: Agent thực hiện kiểm tra tự động (HTTP request) đến toàn bộ các đường link nguồn và link ảnh.</li><li>Nếu phát hiện link bị lỗi (404, không truy cập được) hoặc ảnh hỏng, agent sẽ tự động tìm kiếm nguồn thay thế hoặc sử dụng ảnh mặc định của trường để tránh gửi nội dung lỗi.</li></ul>'+code('PYTHON · Script kiểm tra link & ảnh','<span class="k">import</span> requests\n\n<span class="k">def</span> <span class="f">recheck_assets</span>(news_list):\n    valid_news = []\n    <span class="k">for</span> news <span class="k">in</span> news_list:\n        <span class="c"># Kiểm tra link bài viết & link ảnh</span>\n        res_link = requests.head(news[<span class="s">"link"</span>], timeout=5)\n        res_img = requests.head(news[<span class="s">"image_url"</span>], timeout=5)\n        \n        <span class="k">if</span> res_link.status_code == 200 <span class="k">and</span> res_img.status_code == 200:\n            valid_news.append(news)\n        <span class="k">else</span>:\n            <span class="c"># Log lỗi hoặc thay ảnh dự phòng</span>\n            news[<span class="s">"image_url"</span>] = <span class="s">"assets/fptu_default.png"</span>\n            valid_news.append(news)\n    <span class="k">return</span> valid_news',true)},
      {t:'4. Build HTML (AINews.html)',s:'Dựng giao diện bản tin đẹp mắt',b:'<ul><li>Tổng hợp các bài viết đã qua kiểm duyệt vào file <code>AINews.html</code> dựa trên template responsive được chuẩn hoá.</li><li>Bố cục bao gồm: Header thương hiệu trường, các ô tin có ảnh đại diện, tóm tắt và nút xem chi tiết.</li></ul>'+shot('ainews-render.png','Giao diện bản tin AINews.html sau khi tự động build hoàn thiện')},
      {t:'5. Gửi email qua Outlook (AppleScript/COM)',s:'Tự động hóa ứng dụng Outlook Desktop để gửi thư',b:'<ul><li>Agent gọi script hệ thống để điều khiển Outlook Desktop thực hiện gửi email trực tiếp tới danh sách đăng ký.</li></ul>'+code('APPLESCRIPT · Điều khiển Outlook (macOS)','<span class="k">tell</span> application <span class="s">"Microsoft Outlook"</span>\n    <span class="k">set</span> newMessage <span class="k">to</span> make new outgoing message with properties {subject:<span class="s">"Bản tin AI sáng nay"</span>, content:htmlContent}\n    make new recipient at newMessage with properties {email address:{address:<span class="s">"canbo@fpt.edu.vn"</span>}}\n    send newMessage\n<span class="k">end tell</span>')+'<div class="note"><b>Mẹo cho Windows:</b> Sử dụng thư viện <code>win32com.client</code> trong Python để thao tác tương tự với Outlook Desktop.</div>'}
    ])}</div>
  </div>
</div>`,

`<div class="wrap">

`<div class="wrap">
  <div class="shead reveal"><div class="kicker p3"><span class="dot"></span>Case 2.1 · FPTU AI Meeting Take-note</div><h2>Ghi biên bản họp & <span class="grad-o">gửi tự động</span></h2></div>
  <div class="caserow reveal">

    <div>${acc([
      {t:'1. Khởi tạo & Cắt nhỏ âm thanh (Real-time Slicing)',s:'NodeJS thu âm thanh và gửi từng chunk lên Gemini 3.5',b:'<ul><li>Khi cuộc họp bắt đầu, ứng dụng **NodeJS** thu âm thanh trực tiếp từ micro và tự động cắt thành các phân đoạn ngắn (từ 15-30 giây).</li><li>Ứng dụng gửi trực tiếp các chunk âm thanh này lên API **Gemini 3.5** (hỗ trợ định dạng Audio gốc) để chuyển thành văn bản (script) theo thời gian thực một cách chính xác.</li></ul>'+code('NODEJS · Gửi chunk âm thanh lên Gemini 3.5','<span class="k">const</span> { GoogleGenAI } = require(<span class="s">"@google/genai"</span>);\n<span class="k">const</span> ai = new GoogleGenAI();\n\n<span class="k">async function</span> <span class="f">transcribeChunk</span>(audioBuffer) {\n    <span class="k">const</span> response = <span class="k">await</span> ai.models.generateContent({\n        model: <span class="s">"gemini-3.5-flash"</span>,\n        contents: [\n            {\n                inlineData: {\n                    mimeType: <span class="s">"audio/mp3"</span>,\n                    data: audioBuffer.toString(<span class="s">"base64"</span>)\n                }\n            },\n            <span class="s">"Hãy chuyển đoạn âm thanh cuộc họp này thành văn bản tiếng Việt chính xác."</span>\n        ]\n    });\n    <span class="k">return</span> response.text;\n}',true)},
      {t:'2. Tổng hợp script & Tóm tắt cuộc họp',s:'Biên tập toàn bộ transcript sau khi kết thúc họp',b:'<ul><li>Ngay khi cuộc họp kết thúc, hệ thống NodeJS sẽ ghép nối toàn bộ các đoạn transcript theo mốc thời gian.</li><li>AI tự động hiệu chỉnh chính tả theo ngữ cảnh, tóm tắt các nội dung cốt lõi và biên soạn thành biên bản họp chính thức.</li></ul>'+code('PROMPT · Tổng hợp & Biên tập biên bản','<span class="c"># Vai trò</span>\nBạn là thư ký ảo của cuộc họp tại Trường ĐH FPT Cần Thơ.\n\n<span class="c"># Nhiệm vụ</span>\nDựa trên bản ghi chép (transcript) cuộc họp đính kèm:\n1. Sửa lỗi chính tả & câu cú chưa gãy gọn của văn bản nói.\n2. Tóm tắt nội dung cuộc họp theo các mục thảo luận lớn.\n3. Trích xuất danh sách các quyết định quan trọng.')},

\n    headers = {<span class="s">"access_token"</span>: <span class="s">"ZALO_BOT_TOKEN"</span>}\n    payload = {\n        <span class="s">"recipient"</span>: {<span class="s">"phone"</span>: phone},\n        <span class="s">"message"</span>: {<span class="s">"text"</span>: text}\n    }\n    requests.post(url, json=payload, headers=headers)',true)},

      <h3 class="grad" style="font-size:24px">Từ thử nghiệm → vận hành thật.</h3>
      <p class="muted" style="margin-top:9px">Biến AI thành năng lực vận hành đáng tin cậy hằng ngày của Trường ĐH FPT Cần Thơ.</p>
      <div class="pillrow"><div class="pill">Cảm ơn đã theo dõi 🚀</div></div>
    </div>
  </div>
</div>`
];

/* TOC for left menu */
const TOC=[
  {g:'Mở đầu',items:[[0,'Trang bìa'],[1,'Hai hướng tự động hoá']]},
  {g:'Phần 1 — Công cụ có sẵn & Skill',items:[[2,'Giới thiệu Phần 1'],[3,'1.1 · Lọc & phân loại email'],[4,'1.2 · Tổ chức sự kiện'],[5,'1.3 · Bản tin AI'],[6,'1.4 · Email phòng DVSV']]},
  {g:'Phần 2 — Tự xây công cụ (Vibecode)',items:[[7,'Giới thiệu Phần 2'],[8,'2.1 · Biên bản họp (Python)'],[9,'2.2 · Nhắc lịch coi thi (Python)']]},
  {g:'Hướng dẫn chi tiết',items:[[10,'Giới thiệu hướng dẫn'],[11,'Chọn đúng công cụ'],[12,'① Công thức prompt'],[13,'① Tạo skill cho Cowork'],[14,'① Mẫu SKILL.md'],[15,'② Vibecode Python/npm'],[16,'③ Chỉnh sửa & vận hành'],[17,'Harness — khung kỹ thuật'],[18,'Phân quyền AI (L0–L5)']]},
  {g:'Kết',items:[[19,'Các chú ý khi triển khai']]}
];

/* ============ BUILD ============ */
const deck=document.getElementById('deck'),dotsBox=document.getElementById('dots'),tocBox=document.getElementById('toc');
slides.forEach((html,i)=>{
  const s=document.createElement('section');
  s.className='slide'+(i===0?' active':'')+(html.indexOf('class="shead"')>-1?' doc':'');
  s.tabIndex = -1;
  s.innerHTML=html;deck.appendChild(s);
  const d=document.createElement('div');d.className='d'+(i===0?' on':'');d.addEventListener('click',()=>go(i));dotsBox.appendChild(d);
});
// build TOC
TOC.forEach(grp=>{
  const h=document.createElement('div');h.className='toc-g';h.textContent=grp.g;tocBox.appendChild(h);
  grp.items.forEach(([idx,label])=>{
    const a=document.createElement('div');a.className='toc-a';a.dataset.i=idx;
    a.innerHTML='<span class="n">'+(idx+1).toString().padStart(2,'0')+'</span>'+label;
    a.addEventListener('click',()=>{go(idx);closeMenu();});
    tocBox.appendChild(a);
  });
});
const slideEls=[...document.querySelectorAll('.slide')],dotEls=[...document.querySelectorAll('.dots .d')],tocEls=[...document.querySelectorAll('.toc-a')];
let cur=0;const total=slides.length;document.getElementById('total').textContent=total;
function go(n){
  n=Math.max(0,Math.min(total-1,n));if(n===cur)return;
  slideEls[cur].classList.remove('active');dotEls[cur].classList.remove('on');cur=n;
  slideEls[cur].classList.add('active');slideEls[cur].scrollTop=0;dotEls[cur].classList.add('on');
  slideEls[cur].focus();
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('progress').style.width=(cur/(total-1)*100)+'%';
  tocEls.forEach(a=>a.classList.toggle('active',+a.dataset.i===cur));
  if(window.__setAccent)window.__setAccent(cur/(total-1));
}
tocEls[0]&&tocEls[0].classList.add('active');
/* đo chiều cao tiêu đề cố định để ghim thẻ trái ngay bên dưới */
function measureHead(sl){if(!sl||!sl.classList.contains('doc'))return;const sh=sl.querySelector('.shead');if(sh)sl.style.setProperty('--headh',sh.offsetHeight+'px');}
window.addEventListener('resize',()=>measureHead(slideEls[cur]));
measureHead(slideEls[cur]);
document.getElementById('next').onclick=()=>go(cur+1);
document.getElementById('prev').onclick=()=>go(cur-1);

/* ===== MENU drawer ===== */
const menu=document.getElementById('menu'),overlay=document.getElementById('overlay');
let menuOpen=false;
function openMenu(){menuOpen=true;menu.classList.add('open');overlay.classList.add('show');}
function closeMenu(){menuOpen=false;menu.classList.remove('open');overlay.classList.remove('show');}
function toggleMenu(){menuOpen?closeMenu():openMenu();}
document.getElementById('menuBtn').addEventListener('click',e=>{e.stopPropagation();toggleMenu();});
document.getElementById('closeMenu').addEventListener('click',closeMenu);
overlay.addEventListener('click',closeMenu);

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='Escape'){closeMenu();return;}
  if(menuOpen)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1);}
  if(e.key==='Home')go(0);if(e.key==='End')go(total-1);
});
/* cuộn dọc chỉ cuộn nội dung — KHÔNG đổi slide. Chỉ vuốt NGANG mới chuyển. */
let tX=0,tY=0;
window.addEventListener('touchstart',e=>{tX=e.touches[0].clientX;tY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',e=>{
  if(menuOpen)return;
  const dx=tX-e.changedTouches[0].clientX,dy=tY-e.changedTouches[0].clientY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.4){if(dx>0)go(cur+1);else go(cur-1);}
},{passive:true});

/* accordion + copy */
document.addEventListener('click',e=>{
  const copyBtn=e.target.closest('.copy');
  if(copyBtn){
    const pre=copyBtn.closest('.code').querySelector('pre');
    navigator.clipboard.writeText(pre.innerText).then(()=>{
      copyBtn.textContent='✓ Đã copy';copyBtn.classList.add('done');
      setTimeout(()=>{copyBtn.textContent='Copy';copyBtn.classList.remove('done');},1700);
    }).catch(()=>copyBtn.textContent='Ctrl+C');
    e.stopPropagation();return;
  }
  const head=e.target.closest('.ah');
  if(head){
    head.parentElement.classList.toggle('open');
    const slide = head.closest('.slide');
    if(slide) slide.focus();
  }
});

/* ============ THREE.JS — TECH SPACE (warp on click) ============ */
(function(){
  const canvas=document.getElementById('bg-canvas');
  let renderer,scene,camera,points,lines,stars,raf;
  const N=140,R=80,LINK=20,SN=720;
  const pos=new Float32Array(N*3),vel=[];let accent=0;
  let rotVx=0,rotVy=0,camZ=110,camZTarget=110,warp=0;
  try{renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});}
  catch(err){canvas.style.display='none';return;}
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x070a14,0.0042);
  camera=new THREE.PerspectiveCamera(62,1,1,900);camera.position.z=110;

  const c=document.createElement('canvas');c.width=c.height=64;const cx=c.getContext('2d');
  const g=cx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.25,'rgba(180,230,255,.85)');g.addColorStop(1,'rgba(120,180,255,0)');
  cx.fillStyle=g;cx.beginPath();cx.arc(32,32,32,0,7);cx.fill();
  const tex=new THREE.CanvasTexture(c);

  for(let i=0;i<N;i++){
    pos[i*3]=(Math.random()-.5)*R*2;pos[i*3+1]=(Math.random()-.5)*R*1.3;pos[i*3+2]=(Math.random()-.5)*R*2;
    vel.push(new THREE.Vector3((Math.random()-.5)*.06,(Math.random()-.5)*.06,(Math.random()-.5)*.06));
  }
  const pGeo=new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pMat=new THREE.PointsMaterial({size:2.4,map:tex,transparent:true,opacity:.9,depthWrite:false,blending:THREE.AdditiveBlending,color:new THREE.Color(0x35d0ee)});
  points=new THREE.Points(pGeo,pMat);scene.add(points);

  const lGeo=new THREE.BufferGeometry();const maxSeg=N*6;const lPos=new Float32Array(maxSeg*3*2);
  lGeo.setAttribute('position',new THREE.BufferAttribute(lPos,3));
  const lMat=new THREE.LineBasicMaterial({color:new THREE.Color(0x6f7bff),transparent:true,opacity:.14,blending:THREE.AdditiveBlending,depthWrite:false});
  lines=new THREE.LineSegments(lGeo,lMat);scene.add(lines);

  const sPos=new Float32Array(SN*3);
  for(let i=0;i<SN;i++){sPos[i*3]=(Math.random()-.5)*440;sPos[i*3+1]=(Math.random()-.5)*440;sPos[i*3+2]=-Math.random()*620;}
  const sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
  const sMat=new THREE.PointsMaterial({size:1.35,map:tex,transparent:true,opacity:.62,depthWrite:false,blending:THREE.AdditiveBlending,color:new THREE.Color(0xbfe6ff)});
  stars=new THREE.Points(sGeo,sMat);scene.add(stars);

  function resize(){const w=window.innerWidth,h=window.innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
  window.addEventListener('resize',resize);resize();

  let mx=0,my=0;window.addEventListener('pointermove',e=>{mx=(e.clientX/window.innerWidth-.5);my=(e.clientY/window.innerHeight-.5);});

  function impulse(){
    rotVy+=(Math.random()*0.5+0.5)*0.05*(Math.random()<.5?-1:1);
    rotVx+=(Math.random()-.5)*0.04;
    warp=1;camZTarget=72;
    clearTimeout(impulse._t);impulse._t=setTimeout(()=>{camZTarget=110;},90);
  }
  window.addEventListener('pointerdown',()=>impulse());

  const colA=new THREE.Color(0x35d0ee),colB=new THREE.Color(0x9b8cff),colC=new THREE.Color(0xff9a4d);
  window.__setAccent=v=>{accent=v;};
  function curColor(t){const o=new THREE.Color();if(t<.5)o.copy(colA).lerp(colB,t/.5);else o.copy(colB).lerp(colC,(t-.5)/.5);return o;}

  let hue=0;
  function animate(){
    raf=requestAnimationFrame(animate);
    hue+=(accent-hue)*0.03;const col=curColor(hue);
    pMat.color.copy(col).lerp(new THREE.Color(0xffffff),.25);lMat.color.copy(col);
    sMat.color.copy(col).lerp(new THREE.Color(0xffffff),.5);

    const p=pGeo.attributes.position.array;
    for(let i=0;i<N;i++){
      p[i*3]+=vel[i].x;p[i*3+1]+=vel[i].y;p[i*3+2]+=vel[i].z;
      if(p[i*3]>R||p[i*3]<-R)vel[i].x*=-1;
      if(p[i*3+1]>R*.7||p[i*3+1]<-R*.7)vel[i].y*=-1;
      if(p[i*3+2]>R||p[i*3+2]<-R)vel[i].z*=-1;
    }
    pGeo.attributes.position.needsUpdate=true;

    let s=0;const lp=lGeo.attributes.position.array;
    for(let i=0;i<N&&s<maxSeg;i++)for(let j=i+1;j<N&&s<maxSeg;j++){
      const dx=p[i*3]-p[j*3],dy=p[i*3+1]-p[j*3+1],dz=p[i*3+2]-p[j*3+2];
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(d<LINK){lp[s*6]=p[i*3];lp[s*6+1]=p[i*3+1];lp[s*6+2]=p[i*3+2];lp[s*6+3]=p[j*3];lp[s*6+4]=p[j*3+1];lp[s*6+5]=p[j*3+2];s++;}
    }
    lGeo.setDrawRange(0,s*2);lGeo.attributes.position.needsUpdate=true;

    const sp=sGeo.attributes.position.array;const sv=0.32*(1+warp*9);
    for(let i=0;i<SN;i++){sp[i*3+2]+=sv;if(sp[i*3+2]>camZ){sp[i*3+2]=-620;sp[i*3]=(Math.random()-.5)*440;sp[i*3+1]=(Math.random()-.5)*440;}}
    sGeo.attributes.position.needsUpdate=true;
    warp*=0.93;

    rotVx*=0.94;rotVy*=0.94;
    points.rotation.y+=0.0007+rotVy;points.rotation.x+=0.0003+rotVx;
    lines.rotation.copy(points.rotation);
    stars.rotation.y+=0.00016+rotVy*0.4;

    camZ+=(camZTarget-camZ)*0.08;
    camera.position.x+=(mx*28-camera.position.x)*0.04;
    camera.position.y+=(-my*18-camera.position.y)*0.04;
    camera.position.z=camZ;camera.lookAt(0,0,0);
    renderer.render(scene,camera);
  }
  animate();
  document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else animate();});
})();
</script>
